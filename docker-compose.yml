# Cinema Club DC — Docker Compose for Synology NAS
#
# Deployment steps:
#   1. Copy this project to your Synology NAS
#   2. Copy .env.production.example to .env.production and fill in values
#   3. Run: docker-compose up -d --build
#   4. Access at http://<NAS-IP>:8080
#
# Custom domain setup:
#   - Synology Control Panel → Login Portal → Advanced → Reverse Proxy
#   - Source: https://your-domain.com:443 → Destination: localhost:8080
#   - For external access: set up Cloudflare Tunnel or Synology DDNS
#
# Scraper (run manually or via Synology Task Scheduler):
#   docker exec cinemaclub-backend python scraper.py

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cinemaclub-backend
    env_file: .env.production
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - db-data:/app/instance
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cinemaclub-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Discord bot — announces schedule drops to #movies and serves slash
  # commands. Talks to the backend over the internal Docker network only.
  # Requires DISCORD_BOT_TOKEN / DISCORD_GUILD_ID / DISCORD_CHANNEL_ID /
  # INTERNAL_API_TOKEN in .env.production.
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: cinemaclub-bot
    env_file: .env.production
    environment:
      - BOT_API_BASE=http://backend:5001
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
    driver: local
