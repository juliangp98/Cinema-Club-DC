# Cinema Club DC — Docker Compose for Synology NAS
#
# Deployment steps:
#   1. Copy this project to your Synology NAS
#   2. Copy .env.production.example to .env.production and fill in values
#   3. Run: docker-compose up -d --build
#   4. Access at http://<NAS-IP>:8080
#
# Custom domain setup:
#   - Synology Control Panel → Login Portal → Advanced → Reverse Proxy
#   - Source: https://your-domain.com:443 → Destination: localhost:8080
#   - For external access: set up Cloudflare Tunnel or Synology DDNS
#
# Scraper (run manually or via Synology Task Scheduler):
#   docker exec cinemaclub-backend python scraper.py

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cinemaclub-backend
    env_file: .env.production
    # DNS override — see the note on the `bot` service. Docker's embedded
    # resolver (127.0.0.11) stopped forwarding to an upstream on this NAS, so the
    # scrapers (TMDB / OMDB / venue sites) fail external lookups the same way the
    # bot did. Pin the LAN router, which the NAS confirmed can resolve and which
    # — unlike 8.8.8.8 — isn't blocked by outbound-port-53 filtering.
    dns:
      - 192.168.0.1
    volumes:
      - db-data:/app/instance
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cinemaclub-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Discord bot — announces schedule drops to #movies and serves slash
  # commands. Talks to the backend over the internal Docker network only.
  # Requires DISCORD_BOT_TOKEN / DISCORD_CHANNEL_ID / INTERNAL_API_TOKEN in
  # .env.production. Slash commands sync globally — no guild ID needed.
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: cinemaclub-bot
    env_file: .env.production
    environment:
      - BOT_API_BASE=http://backend:5001
    # DNS override — Docker's embedded resolver (127.0.0.11) stopped forwarding
    # to an upstream on this NAS (containers got "Temporary failure in name
    # resolution" for discord.com / api.groq.com while the host itself resolved
    # fine), and restart/force-recreate didn't restore it. Pin the LAN router,
    # which the NAS confirmed can resolve (`nslookup` → Server: 192.168.0.1) and
    # which — unlike 8.8.8.8 — isn't blocked by outbound-port-53 filtering.
    # Docker still resolves the internal `backend` hostname regardless of this.
    dns:
      - 192.168.0.1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
    driver: local
